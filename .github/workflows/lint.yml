name: Lint

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for comparing commits

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: './Server/requirements.txt'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './Application/package-lock.json'

      - name: Install Node dependencies
        run: npm ci
        working-directory: ./Application

      - name: Run pre-commit on changed files (PR)
        if: github.event_name == 'pull_request'
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --from-ref ${{ github.event.pull_request.base.sha }} --to-ref ${{ github.event.pull_request.head.sha }}

      - name: Run pre-commit on changed files (Push)
        if: github.event_name == 'push'
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --from-ref ${{ github.event.before }} --to-ref ${{ github.event.after }}

      - name: Check for modified migrations
        run: |
          BASE_BRANCH=${GITHUB_BASE_REF:-main}
          if git diff origin/$BASE_BRANCH --name-status -- '*/migrations/*.py' | grep '^M' | grep -v '/__init__.py'; then
            echo "ERROR: Existing migration files should not be modified. Create a new migration instead."
            exit 1
          fi
          echo "No existing migrations were modified."
