services:
  nginx:
    build:
      context: .
      dockerfile: ./compose/production/nginx/Dockerfile
    container_name: inhouse_suite_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - server
    # ports:
    #   - "80:80"
    volumes:
      - dggcrm_production_admin_static_files:/app/staticfiles
    # Configure the public domain for this port-80 service in Coolify's Domains UI
    # instead of hardcoding Traefik host rules in repo-managed compose.
    networks:
      - coolify
      - default
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: journald


  frontend:
    build:
      context: .
      dockerfile: ./compose/production/application/Dockerfile
    image: inhouse_suite_frontend
    container_name: inhouse_suite_frontend
    restart: unless-stopped
    environment:
      - BACKEND_URL=${BACKEND_URL}
      - SENTRY_DSN=${SENTRY_DSN}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN}
    env_file:
      - path: ./.envs/.production/.frontend
        required: false
    expose:
      - "3030"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3030/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: journald

  server: &server
    build:
      context: .
      dockerfile: ./compose/production/server/Dockerfile
    image: inhouse_suite_server
    container_name: inhouse_suite_server
    restart: unless-stopped
    volumes:
      - dggcrm_production_admin_static_files:/app/staticfiles
    env_file:
      - path: ./.envs/.production/.postgres
        required: false
      - path: ./.envs/.production/.discord
        required: false
      - path: ./.envs/.production/.django
        required: false
    environment:
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - DISCORD_BOT_ENABLED=${DISCORD_BOT_ENABLED}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - DISCORD_MEMBERSHIP_TAG=${DISCORD_MEMBERSHIP_TAG}
      - SECRET_KEY=${SECRET_KEY}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - SENTRY_DSN=${SENTRY_DSN}
    expose:
      - "8080"
    command: /start
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/api/health/?format=text"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: journald
    networks:
      - coolify
      - default


volumes:
  dggcrm_production_admin_static_files:

networks:
  coolify:
    external: true
