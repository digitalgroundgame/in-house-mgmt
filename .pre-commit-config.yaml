repos:
  # Python linting and formatting (Server)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        name: ruff lint (Python)
        args: [--fix]
        files: ^Server/
      - id: ruff-format
        name: ruff format (Python)
        files: ^Server/

  # JavaScript/TypeScript linting (Application)
  - repo: local
    hooks:
      - id: eslint
        name: eslint (TypeScript)
        entry: bash -c 'cd Application && npx eslint --fix .'
        language: system
        files: ^Application/.*\.(js|jsx|ts|tsx)$
        pass_filenames: false

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^Application/node_modules/
      - id: end-of-file-fixer
        exclude: ^Application/node_modules/
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
